<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDU | School of Computing Management</title>
    <meta name="description"
        content="Next-generation employee management system with real-time analytics and intuitive UI.">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Login Overlay -->
    <div id="login-screen" class="login-overlay">
        <div class="login-card">
            <img src="logo.png" alt="DDU Logo" style="width: 80px; margin-bottom: 1.5rem;">
            <h1>Dire Dawa University</h1>
            <p>School of Computing Management System</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Admin Username</label>
                    <input type="text" id="username" placeholder="Enter admin username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary btn-full">Access System</button>
            </form>
        </div>
    </div>

    <div id="app" style="display: none;">
        <!-- Sidebar -->
        <aside>
            <a href="#" class="logo">
                <div id="logo-icon-container"></div>
                <span class="logo-text">Dire Dawa University</span>
            </a>
            <nav>
                <a href="#" class="nav-link active" data-view="dashboard">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-link" data-view="employees">
                    <i data-lucide="users"></i>
                    <span>Employees</span>
                </a>
                <a href="#" class="nav-link" data-view="departments">
                    <i data-lucide="layers"></i>
                    <span>Departments</span>
                </a>
                <a href="#" class="nav-link" data-view="payroll">
                    <i data-lucide="credit-card"></i>
                    <span>Payroll</span>
                </a>
                <a href="#" class="nav-link" data-view="settings">
                    <i data-lucide="settings"></i>
                    <span>Settings</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main>
            <header>
                <div class="search-bar">
                    <i data-lucide="search"></i>
                    <input type="text" placeholder="Search employees, tasks, etc...">
                </div>
                <div class="user-profile">
                    <button class="btn-icon">
                        <i data-lucide="bell"></i>
                    </button>
                    <div class="btn-icon">
                        <i data-lucide="user"></i>
                    </div>
                    <div>
                        <p style="font-weight: 600; font-size: 0.9rem;">Junior</p>
                        <p style="color: var(--text-muted); font-size: 0.75rem;">Administrator</p>
                    </div>
                </div>
            </header>

            <div id="content-area">
                <!-- Content will be injected by main.js -->
            </div>
        </main>
    </div>

    <!-- Employee Modal -->
    <div id="employee-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="modal-title">Add New Staff</h2>
            </div>
            <form id="employee-form">
                <input type="hidden" id="emp-id">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="emp-name" placeholder="Enter name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="emp-email" placeholder="email@ddu.edu.et" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="emp-phone" placeholder="+251 ..." required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <input type="text" id="emp-role" placeholder="e.g. Lecturer" required>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select id="emp-dept">
                        <option value="Software Engineering">Software Engineering</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Information Technology">Information Technology</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Salary (Monthly)</label>
                    <input type="number" id="emp-salary" placeholder="Amount" required>
                </div>
                <div class="form-group">
                    <label>Join Date</label>
                    <input type="date" id="emp-join-date" required>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="emp-status">
                        <option value="Active">Active</option>
                        <option value="Remote">Remote</option>
                        <option value="On Leave">On Leave</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-ghost" id="close-modal">Cancel</button>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
